server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://formsubmit.co https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; form-action 'self' https://formsubmit.co; upgrade-insecure-requests" always;

  location = / {
    try_files /index.html =404;
  }

  location ~ ^/(about|experience|services|capabilities|contact-pricing|privacy|terms)/?$ {
    try_files /index.html =404;
  }

  location = /robots.txt {
    try_files $uri =404;
  }

  location = /sitemap.xml {
    try_files $uri =404;
  }

  location /documents/ {
    try_files $uri =404;
  }

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://formsubmit.co https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net; form-action 'self' https://formsubmit.co; upgrade-insecure-requests" always;
    try_files $uri =404;
  }

  location / {
    error_page 404 /index.html;
    return 404;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
